<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous">
</head>

<body>
    <div class=" flex-container">
        
        <div class="widget">
            <div class="image">
                <img src="pozadina.jpg" alt="Weather Background">
                <div class="location-date-and-time">
                    <div class="location"><i class="bi bi-geo-alt-fill"></i>
                        <h3>New York</h3>
                    </div>
                    <p>Tuesday - May 22</p>
                    <div class="time">
                        <p>7:42 <span>AM</span></p>
                    </div>
                </div>

                <div class="cloud">
                    <img src="oblak.png" alt="Cloud">

                </div>
                <div class="detal-info">
                    <div class="left">
                        <p>Feel like 22°</p>
                        <p>Wind: 10 km/h</p>
                        <p>Sunrise: 6:15 AM</p>
                    </div>
                    <div class="sredina">
                        <p>Sunset: 8:45 PM</p>
                    </div>
                    <div class="right">
                        <p>25°</p>
                        <p>Thunder</p>
                    </div>
                    <div class="line"></div>
                </div>
                <div class="forecast">
                    <div class="day">
                        <p>TUE</p>
                        <img src="storm.png" alt="">
                        <p>22°/11°</p>
                    </div>
                    <div class="day">
                        <p>WED</p>

                        <img src="cloudy.png" alt="">
                        <p>25°/15°</p>
                    </div>
                    <div class="day">
                        <p>THU</p>

                        <img src="snow.png" alt="">
                        <p>12°/6°</p>
                    </div>
                    <div class="day">
                        <p>FRI</p>
                        <img src="sunnycloud.png" alt="">
                        <p>25°/20°</p>
                    </div>
                    <div class="day">
                        <p>SAT</p>
                        <img src="sunny.png" alt="">
                        <p>30°/23°</p>
                    </div>
                </div>

            </div>

</body>

</html>
